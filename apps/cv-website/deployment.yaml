apiVersion: apps/v1
kind: Deployment
metadata:
  name: cv-website
  namespace: cv
  labels:
    app: cv-website
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cv-website
  template:
    metadata:
      labels:
        app: cv-website
    spec:
      containers:
        - name: cv-website
          image: ghcr.io/pascariucosmin93/cv-website:0.0.1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
